spring:
  datasource:
    url: jdbc:oracle:thin:@localhost:1521/XEPDB1
    username: family_budget
    password: budget123
    driver-class-name: oracle.jdbc.OracleDriver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.OracleDialect
  sql:
    init:
      mode: never

logging:
  level:
    com.familybudget: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,env,beans
  endpoint:
    health:
      show-details: always
  info:
    app:
      name: Family Budget App
      version: 1.0.0
      description: Aplicatie pentru gestionarea bugetului familial