<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::main}, 'Categorii')}">
<body><main>
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="bi bi-tags me-2 text-primary"></i>Categorii</h2>
    <a th:href="@{/categories/new}" class="btn btn-primary"><i class="bi bi-plus-lg me-1"></i>Categorie noua</a>
</div>
<div class="card border-0 shadow-sm">
    <table class="table table-hover mb-0">
        <thead class="table-light">
            <tr>
                <th><a th:href="@{/categories(sortBy='name', sortDir=${sortBy=='name' ? reverseSortDir : 'asc'})}" class="text-dark text-decoration-none">Nume <i th:if="${sortBy=='name'}" th:class="${sortDir=='asc'?'bi bi-sort-up':'bi bi-sort-down'}"></i></a></th>
                <th><a th:href="@{/categories(sortBy='type', sortDir=${sortBy=='type' ? reverseSortDir : 'asc'})}" class="text-dark text-decoration-none">Tip <i th:if="${sortBy=='type'}" th:class="${sortDir=='asc'?'bi bi-sort-up':'bi bi-sort-down'}"></i></a></th>
                <th class="text-end">Actiuni</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="cat : ${categories}">
                <td th:text="${cat.name}">-</td>
                <td><span class="badge" th:classappend="${cat.type.name()=='INCOME'?'bg-success':'bg-danger'}" th:text="${cat.type}">-</span></td>
                <td class="text-end">
                    <a th:href="@{/categories/{id}/edit(id=${cat.id})}" class="btn btn-sm btn-outline-secondary"><i class="bi bi-pencil"></i></a>
                    <form th:action="@{/categories/{id}/delete(id=${cat.id})}" method="post" class="d-inline" onsubmit="return confirm('Stergi categoria?')">
                        <button class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>
    <div class="card-footer bg-white d-flex justify-content-between align-items-center" th:if="${totalPages > 1}">
        <span class="text-muted small">Pagina <span th:text="${currentPage+1}">1</span> din <span th:text="${totalPages}">1</span></span>
        <nav><ul class="pagination pagination-sm mb-0">
            <li class="page-item" th:classappend="${currentPage==0?'disabled':''}"><a class="page-link" th:href="@{/categories(page=${currentPage-1})}">&laquo;</a></li>
            <li class="page-item" th:each="i : ${#numbers.sequence(0,totalPages-1)}" th:classappend="${i==currentPage?'active':''}"><a class="page-link" th:text="${i+1}" th:href="@{/categories(page=${i})}">1</a></li>
            <li class="page-item" th:classappend="${currentPage==totalPages-1?'disabled':''}"><a class="page-link" th:href="@{/categories(page=${currentPage+1})}">&raquo;</a></li>
        </ul></nav>
    </div>
</div>
</main></body>
</html>
