<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::main}, 'Cont')}">
<body><main>
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card border-0 shadow-sm">
            <div class="card-header bg-white">
                <h5 class="mb-0">
                    <i class="bi bi-credit-card me-2 text-primary"></i>
                    <span th:text="${accountForm.id != null ? 'Editeaza contul' : 'Cont nou'}">Cont</span>
                </h5>
            </div>
            <div class="card-body">
                <form th:action="${accountForm.id != null ? '/accounts/' + accountForm.id + '/edit' : '/accounts/new'}"
                      method="post" th:object="${accountForm}" novalidate class="needs-validation">

                    <div class="mb-3">
                        <label class="form-label">Nume cont *</label>
                        <input type="text" th:field="*{name}"
                               th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'"
                               class="form-control" placeholder="ex: Card Raiffeisen" required/>
                        <div class="invalid-feedback" th:errors="*{name}">Campul este obligatoriu</div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Tip cont *</label>
                        <select th:field="*{type}"
                                th:classappend="${#fields.hasErrors('type')} ? 'is-invalid'"
                                class="form-select" required>
                            <option value="">-- Selecteaza --</option>
                            <option th:each="t : ${accountTypes}" th:value="${t}" th:text="${t}"></option>
                        </select>
                        <div class="invalid-feedback" th:errors="*{type}">Selecteaza tipul</div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Sold initial (RON) *</label>
                        <input type="number" step="0.01" th:field="*{balance}"
                               th:classappend="${#fields.hasErrors('balance')} ? 'is-invalid'"
                               class="form-control" placeholder="0.00" required/>
                        <div class="invalid-feedback" th:errors="*{balance}">Sold invalid</div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Moneda</label>
                        <select th:field="*{currency}" class="form-select">
                            <option value="RON">RON</option>
                            <option value="EUR">EUR</option>
                            <option value="USD">USD</option>
                        </select>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-lg me-1"></i>Salveaza
                        </button>
                        <a th:href="@{/accounts}" class="btn btn-outline-secondary">
                            <i class="bi bi-x-lg me-1"></i>Anuleaza
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
<script>
(function() {
    'use strict';
    document.querySelectorAll('.needs-validation').forEach(function(form) {
        form.addEventListener('submit', function(event) {
            if (!form.checkValidity()) { event.preventDefault(); event.stopPropagation(); }
            form.classList.add('was-validated');
        }, false);
    });
})();
</script>
</main></body>
</html>
