name: CI - Build and Test

# Ruleaza automat la fiecare push si la fiecare Pull Request
on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  build-and-test:
    name: Build & Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout cod sursa
        uses: actions/checkout@v4

      - name: Configurare JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build cu Maven (compileaza tot proiectul)
        run: mvn -B clean compile

      - name: Ruleaza testele automate (profil test, H2 in-memory)
        run: mvn -B test

      - name: Publica rezultatele testelor
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/surefire-reports/

      - name: Pachetare aplicatie (.jar)
        run: mvn -B package -DskipTests

      - name: Publica artefactul .jar
        uses: actions/upload-artifact@v4
        with:
          name: family-budget-app-jar
          path: target/family-budget-app.jar