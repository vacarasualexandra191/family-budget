<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Inregistrare - Budget Familial</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
</head>
<body class="bg-light d-flex align-items-center" style="min-height:100vh;">
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h4 class="card-title text-center mb-4">
                        <i class="bi bi-person-plus text-primary me-2"></i>Cont nou
                    </h4>

                    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

                    <form th:action="@{/register}" method="post" th:object="${registrationForm}"
                          novalidate>

                        <div class="mb-3">
                            <label class="form-label">Nume utilizator *</label>
                            <input type="text" th:field="*{username}"
                                   th:classappend="${#fields.hasErrors('username')} ? 'is-invalid'"
                                   class="form-control" placeholder="min. 3 caractere"/>
                            <div class="invalid-feedback" th:errors="*{username}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Parola *</label>
                            <input type="password" th:field="*{password}"
                                   th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'"
                                   class="form-control" placeholder="min. 6 caractere"/>
                            <div class="invalid-feedback" th:errors="*{password}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Nume complet *</label>
                            <input type="text" th:field="*{fullName}"
                                   th:classappend="${#fields.hasErrors('fullName')} ? 'is-invalid'"
                                   class="form-control"/>
                            <div class="invalid-feedback" th:errors="*{fullName}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Email *</label>
                            <input type="email" th:field="*{email}"
                                   th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
                                   class="form-control"/>
                            <div class="invalid-feedback" th:errors="*{email}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Numele familiei *</label>
                            <input type="text" th:field="*{familyName}"
                                   th:classappend="${#fields.hasErrors('familyName')} ? 'is-invalid'"
                                   class="form-control" placeholder="ex: Familia Popescu"/>
                            <div class="invalid-feedback" th:errors="*{familyName}"></div>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-person-check me-1"></i>Creeaza cont
                            </button>
                        </div>
                    </form>

                    <hr/>
                    <p class="text-center mb-0">
                        Ai deja cont?
                        <a th:href="@{/login}">Autentifica-te</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
