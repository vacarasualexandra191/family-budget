<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Autentificare - Budget Familial</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
</head>
<body class="bg-light d-flex align-items-center" style="min-height:100vh;">
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h4 class="card-title text-center mb-4">
                        <i class="bi bi-piggy-bank text-primary me-2"></i>Budget Familial
                    </h4>

                    <div th:if="${errorMessage}" class="alert alert-danger">
                        <i class="bi bi-x-circle me-1"></i>
                        <span th:text="${errorMessage}"></span>
                    </div>
                    <div th:if="${logoutMessage}" class="alert alert-success">
                        <i class="bi bi-check-circle me-1"></i>
                        <span th:text="${logoutMessage}"></span>
                    </div>
                    <div th:if="${param.registered}" class="alert alert-success">
                        <i class="bi bi-check-circle me-1"></i>
                        Cont creat cu succes! Te poti autentifica acum.
                    </div>

                    <form th:action="@{/login}" method="post">
                        <div class="mb-3">
                            <label for="username" class="form-label">Utilizator</label>
                            <input type="text" id="username" name="username"
                                   class="form-control" required autofocus
                                   placeholder="username"/>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Parola</label>
                            <input type="password" id="password" name="password"
                                   class="form-control" required
                                   placeholder="••••••••"/>
                        </div>
                        <div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input"
                                   id="remember-me" name="remember-me"/>
                            <label class="form-check-label" for="remember-me">Tine-ma minte</label>
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-box-arrow-in-right me-1"></i>Autentificare
                            </button>
                        </div>
                    </form>

                    <hr/>
                    <p class="text-center mb-0">
                        Nu ai cont?
                        <a th:href="@{/register}">Inregistreaza-te</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
