<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::main}, 'Categorie')}">
<body><main>
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card border-0 shadow-sm">
            <div class="card-header bg-white"><h5 class="mb-0"><i class="bi bi-tags me-2 text-primary"></i>Categorie</h5></div>
            <div class="card-body">
                <form th:action="${category.id != null ? '/categories/' + category.id + '/edit' : '/categories/new'}"
                      method="post" th:object="${category}" novalidate class="needs-validation">
                    <div class="mb-3">
                        <label class="form-label">Nume *</label>
                        <input type="text" th:field="*{name}"
                               th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'"
                               class="form-control" required/>
                        <div class="invalid-feedback" th:errors="*{name}">Campul este obligatoriu</div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Tip *</label>
                        <select th:field="*{type}" class="form-select" required>
                            <option value="">-- Selecteaza --</option>
                            <option th:each="t : ${categoryTypes}" th:value="${t}" th:text="${t}"></option>
                        </select>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg me-1"></i>Salveaza</button>
                        <a th:href="@{/categories}" class="btn btn-outline-secondary"><i class="bi bi-x-lg me-1"></i>Anuleaza</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
<script>
(function(){document.querySelectorAll('.needs-validation').forEach(function(f){f.addEventListener('submit',function(e){if(!f.checkValidity()){e.preventDefault();e.stopPropagation();}f.classList.add('was-validated');});});})();
</script>
</main></body>
</html>
